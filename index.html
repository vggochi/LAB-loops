<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Contatos</title>

    <!-- Fonte bonita -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #8400ff 0%, transparent 40%),
                        radial-gradient(circle at bottom right, #00ffaa 0%, transparent 35%),
                        linear-gradient(180deg, #070618 0%, #11142d 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eef2ff;
        }

        .container {
            width: min(460px, 95%);
            padding: 36px 32px;
            border-radius: 28px;
            background: rgba(15, 18, 39, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
            text-align: center;
            backdrop-filter: blur(14px);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        p {
            margin: 0 0 24px;
            color: #b8c6ff;
            font-weight: 300;
            line-height: 1.7;
        }

        button {
            margin-top: 10px;
            padding: 14px 28px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #7700ff 0%, #00ffbf 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.24s ease, box-shadow 0.24s ease;
            font-weight: 600;
            box-shadow: 0 14px 30px rgba(88, 255, 171, 0.24);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(0, 255, 191, 0.32);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 10px 20px rgba(140, 0, 255, 0.2);
        }

        @media (max-width: 520px) {
            .container {
                padding: 28px 24px;
            }

            h1 {
                font-size: 1.75rem;
            }

            button {
                width: 100%;
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lista de Contatos</h1>
        <p>Clique para começar</p>
        <button onclick="iniciarPrograma()">Iniciar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
